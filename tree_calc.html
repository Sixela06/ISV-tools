                    html += `<div style="margin-top: 8px;"><strong>Note on Conditioning:</strong> The table shows raw inherited probabilities. Because the target's phenotype is known, impossible genotypes are excluded and the remaining probabilities are normalized (divided by their sum) to reach 100%.</div>`;
                }
                if (!isCond && illnessMode === 'dominant' && !ddViable) {
                    html += `<div style="margin-top: 8px;"><strong>Note on Lethal DD:</strong> Homozygous dominant (DD) is lethal. The probabilities shown above are prior to normalization excluding the DD outcomes.</div>`;
                }

                return html;
            }

            const explanationPriors = [makeComboTable(0, false), makeComboTable(1, false), makeComboTable(2, false)];
            const explanationConds = [makeComboTable(0, true), makeComboTable(1, true), makeComboTable(2, true)];

            return {
                inconsistent: false,
                probs: targetRes.probs,
                resolvedSexes: resolved,
                explanationPriors: explanationPriors,
                explanationConds: explanationConds
            };
        }

        /* ================================================================
           RUN & DISPLAY RESULTS
           ================================================================ */
        async function runCalculation() {
            correctLinkDirections(); // Auto-correct reverse links
            const res = document.getElementById('results');

            if (!illnessMode) {
                res.innerHTML = '<div class="result-error">⚠ Select an inheritance mode first (Recessive, Dominant, or X-Linked).</div>';
                return;
            }
            if (!targetNodeId || !nodes.find(n => n.id === targetNodeId)) {
                res.innerHTML = '<div class="result-error">⚠ Select a target node first.</div>';
                return;
            }
            const target = nodes.find(n => n.id === targetNodeId);

            if (illnessMode === 'dominant') {
                ddViable = await showDominantViabilityDialog();
            } else {
                ddViable = true;
            }

            let result;
            try {
                result = calculatePedigreeProbabilities();
            } catch (err) {
                res.innerHTML = `<div class="result-error">⚠ Validation Error: ${err.message}</div>`;
                return;
            }

            if (!result) {
                res.innerHTML = '<div class="result-error">⚠ Could not compute — check pedigree structure.</div>';
                return;
            }

            if (result.inconsistent) {
                res.innerHTML = '<div class="result-error">⚠ Inconsistent pedigree! The observed phenotypes are genetically impossible under this inheritance mode.</div>';
                return;
            }

            const { probs, resolvedSexes, explanationPriors, explanationConds } = result;
            const targetSex = resolvedSexes[targetNodeId];

            let html = `<div class="results-title">Node ${targetNodeId} · ${targetSex}</div>`;

            if (illnessMode === 'recessive') {
                const [pAA, pAa, paa] = probs;

                // 1. Prior Section
                html += '<div class="result-section">';
                html += '<div class="result-section-title">Prior Probabilities</div>';
                html += probRow('Homozygous normal (AA)', pAA, '#34d399', explanationPriors[0]);
                html += probRow('Carrier (Aa)', pAa, '#fbbf24', explanationPriors[1]);
                html += probRow('Affected (aa)', paa, '#f87171', explanationPriors[2]);
                html += '</div>';

                // 2. Conditioned Section
                if (target.carrier) {
                    html += '<div class="result-section">';
                    html += '<div class="result-section-title conditioned">If Carrier (Conditioned)</div>';
                    html += probRow('Carrier (Aa)', 1.0, '#fbbf24', explanationConds[1]);
                    html += '</div>';
                } else if (!target.affected) {
                    const sumNormal = pAA + pAa;
                    const condAA = sumNormal > 0 ? pAA / sumNormal : 0.5;
                    const condAa = sumNormal > 0 ? pAa / sumNormal : 0.5;

                    html += '<div class="result-section">';
                    html += '<div class="result-section-title conditioned">If Unaffected (Conditioned)</div>';
                    html += probRow('Homozygous normal (AA)', condAA, '#34d399', explanationConds[0]);
                    html += probRow('Carrier (Aa)', condAa, '#fbbf24', explanationConds[1]);
                    html += '</div>';
                }

            } else if (illnessMode === 'dominant') {
                const [pDD, pDd, pdd] = probs;

                // 1. Prior Section
                html += '<div class="result-section">';
                html += '<div class="result-section-title">Prior Probabilities</div>';
                html += probRow('Homo. affected (DD)', pDD, '#f87171', explanationPriors[0]);
                html += probRow('Hetero. affected (Dd)', pDd, '#fbbf24', explanationPriors[1]);
                html += probRow('Unaffected (dd)', pdd, '#34d399', explanationPriors[2]);
                html += '</div>';

                // 2. Conditioned Section
                if (!target.affected) {
                    html += '<div class="result-section">';
                    html += '<div class="result-section-title conditioned">If Unaffected (Conditioned)</div>';
                    html += probRow('Unaffected (dd)', 1.0, '#34d399', explanationConds[2]);
                    html += '</div>';
                }

            } else {
                // X-linked Recessive
                if (targetSex === 'male') {
                    const [pA, pa] = probs;

                    // 1. Prior Section
                    html += '<div class="result-section">';
                    html += '<div class="result-section-title">Prior Probabilities</div>';
                    html += probRow('Normal (X<sup>A</sup>Y)', pA, '#34d399', explanationPriors[0]);
                    html += probRow('Affected (X<sup>a</sup>Y)', pa, '#f87171', explanationPriors[1]);
                    html += '</div>';

                    // 2. Conditioned Section
                    if (!target.affected) {
                        html += '<div class="result-section">';
                        html += '<div class="result-section-title conditioned">If Unaffected (Conditioned)</div>';
                        html += probRow('Normal (X<sup>A</sup>Y)', 1.0, '#34d399', explanationConds[0]);
                        html += '</div>';
                    }
                } else {
                    const [pAA, pAa, paa] = probs;

                    // 1. Prior Section
                    html += '<div class="result-section">';
                    html += '<div class="result-section-title">Prior Probabilities</div>';
                    html += probRow('Normal (X<sup>A</sup>X<sup>A</sup>)', pAA, '#34d399', explanationPriors[0]);
                    html += probRow('Carrier (X<sup>A</sup>X<sup>a</sup>)', pAa, '#fbbf24', explanationPriors[1]);
                    html += probRow('Affected (X<sup>a</sup>X<sup>a</sup>)', paa, '#f87171', explanationPriors[2]);
                    html += '</div>';

                    // 2. Conditioned Section
                    if (target.carrier) {
                        html += '<div class="result-section">';
                        html += '<div class="result-section-title conditioned">If Carrier (Conditioned)</div>';
                        html += probRow('Carrier (X<sup>A</sup>X<sup>a</sup>)', 1.0, '#fbbf24', explanationConds[1]);
                        html += '</div>';
                    } else if (!target.affected) {
                        const sumNormal = pAA + pAa;
                        const condAA = sumNormal > 0 ? pAA / sumNormal : 0.5;
                        const condAa = sumNormal > 0 ? pAa / sumNormal : 0.5;

                        html += '<div class="result-section">';
                        html += '<div class="result-section-title conditioned">If Unaffected (Conditioned)</div>';
                        html += probRow('Normal (X<sup>A</sup>X<sup>A</sup>)', condAA, '#34d399', explanationConds[0]);
                        html += probRow('Carrier (X<sup>A</sup>X<sup>a</sup>)', condAa, '#fbbf24', explanationConds[1]);
                        html += '</div>';
                    }
                }
            }

            res.innerHTML = html;
        }

        function formatFraction(value) {
            if (!Number.isFinite(value)) return null;
            if (value < 1e-12) return { num: 0, den: 1 };
            if (Math.abs(value - 1) < 1e-12) return { num: 1, den: 1 };

            const gcd = (a, b) => b ? gcd(b, a % b) : a;
            let bestNum = 0;
            let bestDen = 1;
            let bestErr = Math.abs(value);
            const maxDen = 10000;

            for (let den = 1; den <= maxDen; den++) {
                const num = Math.round(value * den);
                const err = Math.abs(value - num / den);
                if (err < bestErr) {
                    bestErr = err;
                    bestNum = num;
                    bestDen = den;
                    if (err < 1e-11) break;
                }
            }

            if (bestNum === 0) return { num: 0, den: 1 };
            if (bestNum === bestDen) return { num: 1, den: 1 };
            const divisor = gcd(Math.abs(bestNum), bestDen);
            return { num: bestNum / divisor, den: bestDen / divisor };
        }

        function showExplanationDialog(title, htmlContent) {
            const overlay = document.createElement('div');
            overlay.className = 'win95-modal-overlay';

            const dialog = document.createElement('div');
            dialog.className = 'win95-dialog';
            dialog.style.width = '600px';

            dialog.innerHTML = `
        <div class="win95-dialog-titlebar">
            <h2>Calculation: ${title}</h2>
            <div class="win95-dialog-close" onclick="this.closest('.win95-modal-overlay').remove()">✕</div>
        </div>
        <div class="win95-dialog-content" style="flex-direction: column;">
            <div style="font-weight: bold; margin-bottom: 8px;">Detailed Analysis:</div>
            <div style="background: #ffffff; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; padding: 10px; width: 100%; overflow-x: auto; box-sizing: border-box;">
                ${htmlContent}
            </div>
        </div>
        <div class="win95-dialog-buttons">
            <button class="win95-btn" onclick="this.closest('.win95-modal-overlay').remove()">OK</button>
        </div>
    `;

            overlay.appendChild(dialog);
            document.body.appendChild(overlay);
        }

        function probRow(label, value, color, formulaHTML = '') {
            const frac = formatFraction(value);
            let pct, fracStr, htmlContent;

            if (frac) {
                fracStr = frac.num === 0 ? '0' : (frac.num === frac.den ? '1' : `${frac.num}/${frac.den}`);
                pct = (frac.num / frac.den * 100).toFixed(1);
            } else {
                pct = (value * 100).toFixed(1);
                fracStr = '';
            }

            htmlContent = formulaHTML || `<div>Value: ${value.toFixed(6)}</div>`;

            const encodedLabel = encodeURIComponent(label).replace(/'/g, "%27");
            const encodedFormula = encodeURIComponent(htmlContent).replace(/'/g, "%27");

            return `<div class="result-row clickable" title="Click for detailed calculation" onclick="showExplanationDialog(decodeURIComponent('${encodedLabel}'), decodeURIComponent('${encodedFormula}'))"><span>${label}</span><span>${pct}%` + (fracStr ? ` (${fracStr})` : '') + `</span></div>`
                + `<div class="result-bar"><div style="width:${pct}%;background:${color}"></div></div>`;
        }

        /* ================================================================
           INIT
           ================================================================ */
        setTool('add');
    </script>
</body>
